<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Service de Messages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Mini Service de Messages</h1>
        <button id="toggle-style" aria-label="Changer le mode sombre/clair">
            <span id="theme-icon">🌙</span>
        </button>
    </header>
    <main>
        <section>
            <h2>Messages</h2>
            <ul id="messages-list">
            </ul>
        </section>
        <section>
            <h2>Poster un nouveau message</h2>
            <textarea id="new-message" rows="3" cols="40" placeholder="Votre message..."></textarea>
            <br>
            <button id="send-btn">Envoyer</button>
            <button id="update-btn">Mise à jour</button>
        </section>
        <!-- Section Changer de style supprimée, le bouton est dans le header -->
    </main>
    <script src="script.js"></script>
</body>
</html>
